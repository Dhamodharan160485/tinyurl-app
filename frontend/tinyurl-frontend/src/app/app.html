<!-- =====================================================
FILE: app.html
PURPOSE: Root template - defines the overall page layout

Layout structure:
  Header  - App title and subtitle
  Main   -  Form + List components
  Footer  - Credits
===================================================== -->

<!-- Main wrapper -->
<div class="app-container">

  <!-- ─── Header ─────────────────────────────────── -->
  <header class="app-header">
    <h1>Tiny URL</h1>
    <p class="subtitle">Shorten, share and track your links</p>
  </header>

  <!-- ─── Main Content ────────────────────────────── -->
  <main class="app-main">

    <!-- URL Form Component -->
    <!-- (urlAdded) listens for event from UrlFormComponent -->
    <!-- When event fires, onUrlAdded($event) is called -->
    <!-- $event = the TinyUrlEntry object emitted -->
    <app-url-form
      (urlAdded)="onUrlAdded($event)">
    </app-url-form>

    <!-- URL List Component -->
    <!-- #urlList gives us a template reference -->
    <!-- @ViewChild uses this to get component instance -->
    <app-url-list></app-url-list>

  </main>

  <!-- ─── Footer ──────────────────────────────────── -->
  <footer class="app-footer">
    <p>Built with Angular &amp; .NET Core</p>
  </footer>

</div>
