# =====================================================
# FILE: .github/workflows/cicd.yml
# PURPOSE: CI/CD pipeline for TinyURL app
#
# What is CI/CD?
# CI = Continuous Integration
# → Every push to main branch triggers this workflow
# → Automatically builds the code
#
# CD = Continuous Deployment
# → After successful build, automatically deploys
#   to Azure without manual steps
#
# This workflow uses Azure Login with Service Principal
# instead of Publish Profile because Free tier (F1)
# does not support Web Deploy publish profiles
# =====================================================

name: CI/CD - TinyURL

# -------------------------------------------------------
# Trigger: runs when code is pushed to main branch
# -------------------------------------------------------
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # =====================================================
  # JOB 1: Build and Deploy Backend
  # =====================================================
  build-and-deploy-backend:
    name: Backend - Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # Step 1: Checkout code from GitHub
      # -------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 2: Setup .NET 8
      # -------------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # -------------------------------------------------------
      # Step 3: Restore packages
      # -------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend/TinyUrl.Api

      # -------------------------------------------------------
      # Step 4: Build the project
      # -------------------------------------------------------
      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend/TinyUrl.Api

      # -------------------------------------------------------
      # Step 5: Publish with Linux runtime
      # -------------------------------------------------------
      - name: Publish
        run: dotnet publish -c Release -r linux-x64 --self-contained false -o ./publish
        working-directory: backend/TinyUrl.Api

      # -------------------------------------------------------
      # Step 6: Login to Azure using Service Principal
      # AZURE_CREDENTIALS secret contains the JSON
      # with clientId, clientSecret, subscriptionId, tenantId
      # -------------------------------------------------------
      - name: Login to Azure
        uses: azure/login@v1
        if: github.ref == 'refs/heads/main'
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # -------------------------------------------------------
      # Step 7: Deploy to Azure using ZIP deploy
      # -------------------------------------------------------
      - name: Deploy to Azure
        if: github.ref == 'refs/heads/main'
        run: |
          cd backend/TinyUrl.Api/publish
          zip -r ../deploy.zip .
          az webapp deploy --resource-group tinyurl-rg --name ${{ secrets.AZURE_WEBAPP_NAME_API }} --src-path ../deploy.zip --type zip

  # =====================================================
  # JOB 2: Build and Deploy Frontend
  # =====================================================
  build-and-deploy-frontend:
    name: Frontend - Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # Step 1: Checkout code
      # -------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 2: Setup Node.js 20
      # -------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -------------------------------------------------------
      # Step 3: Install packages
      # -------------------------------------------------------
      - name: Install dependencies
        run: npm install
        working-directory: frontend/tinyurl-frontend

      # -------------------------------------------------------
      # Step 4: Build Angular for production
      # -------------------------------------------------------
      - name: Build Angular
        run: npm run build -- --configuration production
        working-directory: frontend/tinyurl-frontend

      # -------------------------------------------------------
      # Step 5: Login to Azure
      # -------------------------------------------------------
      - name: Login to Azure
        uses: azure/login@v1
        if: github.ref == 'refs/heads/main'
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # -------------------------------------------------------
      # Step 6: Deploy Frontend to Azure
      # -------------------------------------------------------
      - name: Deploy to Azure
        if: github.ref == 'refs/heads/main'
        run: |
          cd frontend/tinyurl-frontend/dist/tinyurl-frontend/browser
          zip -r ../../../../../frontend-deploy.zip .
          az webapp deploy --resource-group tinyurl-rg --name ${{ secrets.AZURE_WEBAPP_NAME_FRONTEND }} --src-path ../../../../../frontend-deploy.zip --type zip